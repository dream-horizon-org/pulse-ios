name: Validate Release PR

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Framework Compatibility
    if: startsWith(github.head_ref, 'release/')
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        run: |
          VERSION=$(grep "spec.version" PulseKit.podspec | head -1 | sed "s/.*\"\(.*\)\"/\1/")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "::notice::Validating version: $VERSION"

      - name: Validate version consistency
        run: |
          PODSPEC_VERSION=$(grep "spec.version" PulseKit.podspec | head -1 | sed "s/.*\"\(.*\)\"/\1/")
          SPM_VERSION=$(grep 'let version' Package.swift | head -1 | sed 's/.*"\(.*\)"/\1/')

          echo "Podspec version:       $PODSPEC_VERSION"
          echo "Package.swift version: $SPM_VERSION"

          if [ "$PODSPEC_VERSION" != "$SPM_VERSION" ]; then
            echo "::error::Version mismatch — podspec: $PODSPEC_VERSION, Package.swift: $SPM_VERSION"
            exit 1
          fi
          echo "::notice::Versions consistent: $PODSPEC_VERSION"

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Validate podspec (builds framework via CocoaPods)
        run: |
          pod lib lint PulseKit.podspec --allow-warnings
          echo "::notice::Podspec lint passed — framework builds successfully"

      - name: Summary
        if: always()
        run: |
          echo "## Release PR Validation — v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | What it validates |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version consistency | podspec version == Package.swift version |" >> $GITHUB_STEP_SUMMARY
          echo "| CocoaPods lint | Framework links, dependencies resolve, podspec valid |" >> $GITHUB_STEP_SUMMARY
